<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>



    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link href='styles.css' rel='stylesheet' type='text/css'>
</head>
<body>
    

    <!-- Particles Render Window -->
    <!--- Fixed background -->
    <figure>
        <div class="fixed-wrap">
        <div id="fixed">
            <div id="particles-js"></div>
        </div>
        </div>
    </figure>
  
    

    
    <!-- Caption/Call to action-->
    <div class="caption text-center text-light" id="caption-container">

        <h1 class='cta' id="cta-H1">JARROD GOODNEY</h1>
        <h3 class='cta' id='cta-H3'>Student of Front-End Technologies</h3>
        <a href="" class="btn btn-outline-light btn-lg" href=''>Let's Talk!</a>
    </div>

    <!-- NavBar Area -->
    <nav class="navbar justify-content-center">
        
        <a href="" class="nav-item active" id='HOME'>HOME</a>
        <a href="" class="nav-item">PORTFOLIO</a>
        <a href="" class="nav-item">ABOUT</a>
        <a href="" class="nav-item">CONTACT</a>
    </nav>


    <!--Portfolio Section-->
    <div class="jumbotron jumbotron-fluid text-light">
        <div class="container">
            <h2 id='aboutTitle'>Stuff I know a thing or two about...</h2>
            <hr class="divider">
        </div>
        <div class="row technologies">
            <div class="col-sm">
                <i class="fab fa-html5"></i>
                <p class='info'>Html5</p>
            </div>
            <div class="col-sm">
                <i class="fab fa-css3-alt"></i>
                <p class='info'>CSS3</p>
            </div>
            <div class="col-sm">
                <i class="fab fa-js-square"></i>
                <p class='info'>Javascript ES6</p>
            </div>
            
            <div class="col-sm">
                <i class="fab fa-react"></i>
                <p class='info'>React</p>
            </div>
            
        </div>
            <div class="container center-content">
                <h2 id="aboutTitle">Stuff I would like to know a thing or two about...</h2>
                <hr class="divider">
            </div>
            <div class="row">

            </div>
    </div>

  


    <!-- Particles Render Window -->
    <!--- Fixed background -->
    <figure>
        <div class="fixed-wrap">
        <div id="fixed">
            <div id="particles-js2"></div>
        </div>
        </div>
    </figure>

    <div class="container-fluid footer justify-content-center">
        <h1 id='contactCTA'>Contact Me!</h1>
        <hr class="light">

        <p class="lead" id='questionCTA'>If you have any questions feel free to ask!</p>
        <div class="row" id='test'>
            <form action="">
                <div class="form-group">
                    <div class="col-sm">
                    <input type="text" placeholder=' Your Name'>
                    </div>
                    <div class="col-sm">
                        <input type="email" placeholder=" Your Email">
                    </div>
                    <div class="col-sm">
                        <textarea placeholder=' Your Message' name="message" id="" cols="30" rows="10"></textarea>
                        
                    </div> 
                    <button class="btn btn-outline-light btn-lg" id='submit'>SUBMIT</button>                  
                </div>
                
            </form>
        </div>
        <div class="row socials justify-content-center">
                <i class="fab fa-discord"></i>
                <i class="fab fa-twitch"></i>
                <i class="fab fa-twitter-square"></i>
        </div>
            
    </div>
    

    <script src="https://kit.fontawesome.com/51c0611afb.js" crossorigin="anonymous"></script>
    <script src="particles.js"></script>
    <script src="app.js"></script>
</body>
</html>
